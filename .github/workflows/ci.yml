name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: brew install bash zsh shellcheck bats-core age jq

      - name: Install pinned Node dependencies
        run: npm ci

      # The definition of "passing" lives in `tools check`, not here —
      # run the same command locally before pushing.
      - name: tools check
        run: TOOLS_HOME="$PWD" ./bin/tools check
